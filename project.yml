name: TelegramUserClient
options:
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
targets:
  TelegramUserClient:
    type: application
    platform: iOS
    sources:
      - path: Sources/App
    settings:
      base:
        PRODUCT_NAME: TelegramUserClient
        PRODUCT_BUNDLE_IDENTIFIER: online.maseai.telegramuserclient
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/tdlib/include"
        "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]":
          - "$(SRCROOT)/tdlib/lib-iphoneos"
        "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]":
          - "$(SRCROOT)/tdlib/lib"
        "OTHER_LDFLAGS[sdk=iphoneos*]":
          - "-ltdjson_static"
          - "-ltdjson_private"
          - "-ltdclient"
          - "-ltdcore"
          - "-ltdapi"
          - "-ltdactor"
          - "-ltdutils"
          - "-ltddb"
          - "-ltdsqlite"
          - "-ltdnet"
          - "-ltdmtproto"
          - "-ltde2e"
          - "-lssl"
          - "-lcrypto"
          - "-lc++"
          - "-lz"
        "OTHER_LDFLAGS[sdk=iphonesimulator*]":
          - "-ltdjson"
          - "-ltdjson_private"
          - "-ltdclient"
          - "-ltdcore"
          - "-ltdapi"
          - "-ltdactor"
          - "-ltdutils"
          - "-ltddb"
          - "-ltdsqlite"
          - "-ltdnet"
          - "-ltdmtproto"
          - "-ltde2e"
          - "-lssl"
          - "-lcrypto"
          - "-lc++"
          - "-lz"
