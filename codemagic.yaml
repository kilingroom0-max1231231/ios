workflows:
  telegram-user-client-simulator:
    name: Telegram User Client Simulator
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "TelegramUserClient.xcodeproj"
        XCODE_SCHEME: "TelegramUserClient"
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Validate TDLib artifacts
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          echo "Using APP_DIR=$APP_DIR"
          if [ ! -f "$APP_DIR/tdlib/lib/libtdjson.a" ]; then
            echo "Missing tdlib/lib/libtdjson.a"
            exit 1
          fi
          if [ ! -d "$APP_DIR/tdlib/include" ]; then
            echo "Missing tdlib/include"
            exit 1
          fi

      - name: Generate Xcode project
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          cd "$APP_DIR"
          xcodegen generate --spec project.yml

      - name: Build unsigned simulator app
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          cd "$APP_DIR"
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Pack simulator app
        script: |
          mkdir -p "$CM_BUILD_DIR/build"
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -type d -path "*/Build/Products/Debug-iphonesimulator/*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Simulator .app not found"
            exit 1
          fi
          cd "$(dirname "$APP_PATH")"
          zip -r "$CM_BUILD_DIR/build/TelegramUserClient-simulator.zip" "$(basename "$APP_PATH")"
    artifacts:
      - build/*.zip
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

  telegram-user-client-device-ipa:
    name: Telegram User Client Device IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "TelegramUserClient.xcodeproj"
        XCODE_SCHEME: "TelegramUserClient"
        BUNDLE_ID: "online.maseai.telegramuserclient"
        EXPORT_METHOD: "ad-hoc"
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: online.maseai.telegramuserclient
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Validate TDLib artifacts
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          echo "Using APP_DIR=$APP_DIR"
          if [ ! -f "$APP_DIR/tdlib/lib/libtdjson.a" ]; then
            echo "Missing tdlib/lib/libtdjson.a"
            exit 1
          fi
          if [ ! -d "$APP_DIR/tdlib/include" ]; then
            echo "Missing tdlib/include"
            exit 1
          fi

      - name: Generate Xcode project
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          cd "$APP_DIR"
          xcodegen generate --spec project.yml

      - name: Configure code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_ADHOC --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Build signed IPA for devices
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          cd "$APP_DIR"
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-flags="-destination 'generic/platform=iOS'"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log

  telegram-user-client-altstore-ipa:
    name: Telegram User Client AltStore IPA
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT: "TelegramUserClient.xcodeproj"
        XCODE_SCHEME: "TelegramUserClient"
    scripts:
      - name: Install XcodeGen
        script: brew install xcodegen

      - name: Resolve project directory
        script: |
          APP_DIR="$CM_BUILD_DIR/ios-telegram-user-client"
          if [ ! -f "$APP_DIR/project.yml" ]; then
            APP_DIR="$CM_BUILD_DIR"
          fi
          echo "APP_DIR=$APP_DIR" >> $CM_ENV

      - name: Validate TDLib artifacts
        script: |
          if [ ! -f "$APP_DIR/tdlib/lib/libtdjson.a" ]; then
            echo "Missing simulator tdlib/lib/libtdjson.a"
            exit 1
          fi
          if [ ! -f "$APP_DIR/tdlib/lib-iphoneos/libtdjson_static.a" ]; then
            echo "Missing device tdlib/lib-iphoneos/libtdjson_static.a"
            exit 1
          fi
          if [ ! -d "$APP_DIR/tdlib/include" ]; then
            echo "Missing tdlib/include"
            exit 1
          fi

      - name: Generate Xcode project
        script: |
          cd "$APP_DIR"
          xcodegen generate --spec project.yml

      - name: Build unsigned app for iPhoneOS
        script: |
          cd "$APP_DIR"
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Pack unsigned IPA for AltStore
        script: |
          mkdir -p "$CM_BUILD_DIR/build/Payload"
          APP_PATH=$(find "$HOME/Library/Developer/Xcode/DerivedData" -type d -path "*/Build/Products/Release-iphoneos/*.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Device .app not found"
            exit 1
          fi
          cp -R "$APP_PATH" "$CM_BUILD_DIR/build/Payload/"
          cd "$CM_BUILD_DIR/build"
          zip -r "TelegramUserClient-altstore-unsigned.ipa" Payload
    artifacts:
      - build/*.ipa
      - /tmp/xcodebuild_logs/*.log
