<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}{{ app_name }} — Telegram для iOS{% endblock %}</title>
    <meta name="description" content="Неофициальный Telegram-клиент для iOS с дизайном Liquid Glass, реакциями, папками и высокой скоростью." />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#eef6ff", 100: "#d9ecff", 200: "#b6d9ff",
                            300: "#86c0ff", 400: "#4f9dff", 500: "#2a7fff",
                            600: "#1361f0", 700: "#0f4ccc", 800: "#1340a4",
                            900: "#163a82", 950: "#11244f",
                        },
                        ink: "#070b14",
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
                    },
                    animation: {
                        'float-slow': 'float 9s ease-in-out infinite',
                        'float-slower': 'float 13s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%,100%': { transform: 'translateY(0) translateX(0)' },
                            '50%': { transform: 'translateY(-26px) translateX(14px)' },
                        },
                    },
                },
            },
        };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%232a7fff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M22 2 11 13'/><path d='M22 2 15 22l-4-9-9-4z'/></svg>" />
</head>
<body class="bg-ink text-slate-100 antialiased selection:bg-brand-500/40">
    <!-- animated background -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-32 -left-24 h-96 w-96 rounded-full bg-brand-600/30 blur-3xl animate-float-slow"></div>
        <div class="absolute top-1/3 -right-24 h-[28rem] w-[28rem] rounded-full bg-cyan-500/20 blur-3xl animate-float-slower"></div>
        <div class="absolute bottom-0 left-1/3 h-80 w-80 rounded-full bg-indigo-600/20 blur-3xl animate-float-slow"></div>
        <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,rgba(42,127,255,0.10),transparent_55%)]"></div>
    </div>

    {% include 'partials/nav.html' %}

    <main>
        {% block content %}{% endblock %}
    </main>

    {% include 'partials/footer.html' %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
